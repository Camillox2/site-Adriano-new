name: Build HostGator Package

on:
  push:
    branches:
      - feature/landing-alugar-hifu
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build with diagnostics
        id: compile
        shell: bash
        run: |
          set +e
          echo "Node: $(node --version)" | tee build.log
          echo "npm: $(npm --version)" | tee -a build.log
          npm ci 2>&1 | tee -a build.log
          install_code=${PIPESTATUS[0]}
          build_code=99
          if [ "$install_code" -eq 0 ]; then
            CI=true npm run build 2>&1 | tee -a build.log
            build_code=${PIPESTATUS[0]}
          fi
          echo "install_code=$install_code" >> "$GITHUB_OUTPUT"
          echo "build_code=$build_code" >> "$GITHUB_OUTPUT"
          echo "INSTALL_EXIT=$install_code" | tee -a build.log
          echo "BUILD_EXIT=$build_code" | tee -a build.log
          exit 0

      - name: Prepare HostGator package
        if: steps.compile.outputs.build_code == '0'
        shell: bash
        run: |
          mkdir -p hostgator-package
          cp -R build/. hostgator-package/
          cat > hostgator-package/.htaccess <<'HTACCESS'
          Options -MultiViews
          RewriteEngine On
          RewriteBase /
          RewriteCond %{REQUEST_FILENAME} -f [OR]
          RewriteCond %{REQUEST_FILENAME} -d
          RewriteRule ^ - [L]
          RewriteRule ^ index.html [L]
          HTACCESS
          test -f hostgator-package/index.html
          test -f hostgator-package/.htaccess

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload HostGator build
        if: steps.compile.outputs.build_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: dradrianocamillo-hostgator-build
          path: hostgator-package
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

      - name: Fail workflow when compilation fails
        if: steps.compile.outputs.build_code != '0'
        run: |
          echo "Installation exit: ${{ steps.compile.outputs.install_code }}"
          echo "Build exit: ${{ steps.compile.outputs.build_code }}"
          exit 1
